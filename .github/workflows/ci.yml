name: CI

on:
  push:
    branches: [main]
    paths: ["vision-rag/**"]
  pull_request:
    branches: [main]
    paths: ["vision-rag/**"]

defaults:
  run:
    working-directory: vision-rag

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check proxy/ tests/
      - run: ruff format --check proxy/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ".[test]"
      - run: pytest --cov --cov-report=term-missing --tb=short -q
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: vision-rag/htmlcov/

  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t vision-rag:ci .
